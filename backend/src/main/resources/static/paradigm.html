<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paradigm</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #05060a;
      color: #eaeef7;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    #root {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #overlay {
      position: fixed; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 10;
      padding: 24px;
      text-align: center;
    }
    #overlay .card {
      max-width: 820px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 18px 18px 14px;
      background: rgba(10,12,18,0.75);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }
    .btn {
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.06);
      color: #eaeef7;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn:hover { background: rgba(255,255,255,0.10); }
    .muted { opacity: 0.85; }
    #timer {
      position: fixed;
      top: 14px; right: 14px;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      font-weight: 700;
      z-index: 2;
    }
    #stageText {
      font-size: 34px;
      line-height: 1.3;
      text-align: center;
      max-width: 980px;
      padding: 0 18px;
    }
  </style>
</head>
<body>
  <div id="timer">—</div>

  <div id="overlay">
    <div class="card">
      <div style="font-size:24px;font-weight:800;margin-bottom:8px;">Paradigm Ready</div>
      <div class="muted" style="font-size:16px;line-height:1.35;">
        This window will go fullscreen for the test.<br/>
        Click <b>Start Fullscreen</b> to begin.
      </div>
      <div style="margin-top:14px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button class="btn" id="btnStartFs">Start Fullscreen</button>
        <button class="btn" id="btnAbort">Abort</button>
      </div>
      <div class="muted" style="margin-top:10px;font-size:13px;">
        Tip: If fullscreen is blocked, click anywhere in this window then try again.
      </div>
    </div>
  </div>

  <div id="root">
    <div id="stageText">Waiting for controller…</div>
  </div>

  <script src="/js/paradigmRunner.js"></script>
</body>
</html>
