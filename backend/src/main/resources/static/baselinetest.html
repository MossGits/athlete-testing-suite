<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baseline Test</title>
  <link href="/css/theme.css" rel="stylesheet"/>
  <style>
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:12px 0;}
    .card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px;}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.18)}
    .ok{color:#49d17f}
    .bad{color:#ff6b6b}
    .warn{color:#ffd166}
    button[disabled]{opacity:0.5;cursor:not-allowed}

    .qualityWrap{
      margin-top:10px;
    }

    .qualityTitle{
      font-weight:700;
      margin-bottom:10px;
    }

    .qualityImageCard{
      position:relative;
      width:min(100%, 640px);
      margin:0 auto;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      padding:12px;
    }

    .qualityImage{
      display:block;
      width:100%;
      height:auto;
      border-radius:10px;
    }

    .sensorDot{
      position:absolute;
      width:22px;
      height:22px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,0.9);
      box-shadow:0 0 0 3px rgba(0,0,0,0.18);
      transform:translate(-50%, -50%);
    }

    .sensorLabel{
      position:absolute;
      transform:translateX(-50%);
      font-size:.9rem;
      font-weight:700;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(255,255,255,0.82);
      color:#1f2937;
      border:1px solid rgba(0,0,0,0.08);
      white-space:nowrap;
    }

    .status-good{
      background:#49d17f;
    }

    .status-warn{
      background:#ffd166;
    }

    .status-bad{
      background:#ff6b6b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Baseline Test</h1>

    <div class="card">
      <div class="row">
        <span class="pill">Athlete: <strong id="athleteId">—</strong></span>
        <span class="pill">Mode: <strong id="mode">—</strong></span>
      </div>

      <div class="row">
        <button id="btnConnect">Connect Muse</button>
        <button id="btnStart" disabled>Start Test</button>
      </div>

      <div class="row">
        <span class="pill" id="pMuse"><span class="bad">●</span> Muse: <strong>disconnected</strong></span>
        <span class="pill" id="pStreams"><span class="warn">●</span> Streams: <strong>waiting</strong></span>
        <span class="pill" id="pQuality"><span class="warn">●</span> Quality: <strong>not started</strong></span>
        <span class="pill" id="pRun"><span class="warn">●</span> Test: <strong>idle</strong></span>
      </div>

      <div id="qualityPanel" class="qualityWrap" style="display:none">
        <div class="qualityTitle">Connection Quality</div>

        <div class="qualityImageCard">
          <img
            src="/images/muse2-front.png"
            alt="Muse headset sensor positions"
            class="qualityImage"
          />

          <div id="dot-left-ear" class="sensorDot status-bad" style="left: 13%; top: 36%;"></div>
          <div id="dot-left-forehead" class="sensorDot status-bad" style="left: 39.5%; top: 19%;"></div>
          <div id="dot-right-forehead" class="sensorDot status-bad" style="left: 60.5%; top: 19%;"></div>
          <div id="dot-right-ear" class="sensorDot status-bad" style="left: 87%; top: 36%;"></div>

          <div class="sensorLabel" style="left: 13%; top: 44%;">Left Ear</div>
          <div class="sensorLabel" style="left: 39.5%; top: 27%;">Left Forehead</div>
          <div class="sensorLabel" style="left: 60.5%; top: 27%;">Right Forehead</div>
          <div class="sensorLabel" style="left: 87%; top: 44%;">Right Ear</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/muse/Muse.js"></script>
  <script src="/js/testRunner.js"></script>
</body>
</html>
